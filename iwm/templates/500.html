{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 - Server Error | I Want More</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="{% static 'imgs/logo.jpg' %}" type="image/x-icon">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #fff0f3 0%, #ffe4ec 40%, #ffc2d4 100%);
      color: #333;
      text-align: center;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
    }

    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: 0.12;
      animation: drift 9s ease-in-out infinite alternate;
    }
    body::before {
      width: 380px; height: 380px;
      background: #ff4e6a;
      top: -100px; right: -100px;
    }
    body::after {
      width: 280px; height: 280px;
      background: #ff8fab;
      bottom: -60px; left: -80px;
      animation-delay: 3s;
    }

    .card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 56px 48px 48px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(255, 78, 106, 0.15);
      position: relative;
      z-index: 1;
    }

    /* Animated gears */
    .illustration {
      margin-bottom: 20px;
    }
    .gear-big {
      transform-origin: 44px 44px;
      animation: spin 6s linear infinite;
    }
    .gear-small {
      transform-origin: 78px 62px;
      animation: spin-reverse 4s linear infinite;
    }
    .exclaim {
      animation: shake 1.5s ease-in-out infinite;
    }

    .error-code {
      font-size: 96px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #ff4e6a, #ff8fab);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -4px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .brand img {
      height: 32px;
      width: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    .brand span {
      font-size: 15px;
      font-weight: 600;
      color: #ff4e6a;
      letter-spacing: 0.5px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #2d2d2d;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      font-weight: 300;
      color: #666;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff5f7;
      border: 1px solid #ffc2d4;
      border-radius: 50px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #ff4e6a;
      margin-bottom: 20px;
    }
    .dot {
      width: 8px; height: 8px;
      background: #ff4e6a;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.25s ease;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ff4e6a, #ff6f91);
      color: #fff;
      box-shadow: 0 6px 20px rgba(255, 78, 106, 0.35);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(255, 78, 106, 0.45);
    }
    .btn-secondary {
      background: #fff;
      color: #ff4e6a;
      border: 2px solid #ffc2d4;
    }
    .btn-secondary:hover {
      border-color: #ff4e6a;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 78, 106, 0.1);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes spin-reverse {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }
    @keyframes shake {
      0%, 100% { transform: translateY(0); }
      25% { transform: translateY(-4px); }
      75% { transform: translateY(4px); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to { transform: translate(25px, 15px); }
    }

    @media (max-width: 480px) {
      .card { padding: 40px 28px 36px; }
      .error-code { font-size: 72px; }
      h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="brand">
      <img src="{% static 'imgs/iwm.png' %}" alt="I Want More">
      <span>I Want More</span>
    </div>

    <!-- Animated gears illustration -->
    <div class="illustration">
      <svg width="110" height="110" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Big gear -->
        <g class="gear-big">
          <circle cx="44" cy="44" r="18" stroke="#ff4e6a" stroke-width="3" fill="none" opacity="0.15"/>
          <circle cx="44" cy="44" r="18" stroke="#ff4e6a" stroke-width="3" fill="none"/>
          <circle cx="44" cy="44" r="7" fill="#ff4e6a" opacity="0.3"/>
          <!-- Gear teeth -->
          <rect x="41" y="21" width="6" height="9" rx="2" fill="#ff4e6a"/>
          <rect x="41" y="58" width="6" height="9" rx="2" fill="#ff4e6a"/>
          <rect x="21" y="41" width="9" height="6" rx="2" fill="#ff4e6a"/>
          <rect x="58" y="41" width="9" height="6" rx="2" fill="#ff4e6a"/>
          <rect x="27.5" y="27.5" width="6" height="9" rx="2" fill="#ff4e6a" transform="rotate(45 30.5 32)"/>
          <rect x="54" y="54" width="6" height="9" rx="2" fill="#ff4e6a" transform="rotate(45 57 58.5)"/>
          <rect x="27.5" y="54" width="9" height="6" rx="2" fill="#ff4e6a" transform="rotate(-45 32 57)"/>
          <rect x="54" y="27.5" width="9" height="6" rx="2" fill="#ff4e6a" transform="rotate(-45 58.5 30.5)"/>
        </g>
        <!-- Small gear -->
        <g class="gear-small">
          <circle cx="78" cy="62" r="12" stroke="#ff8fab" stroke-width="2.5" fill="none" opacity="0.15"/>
          <circle cx="78" cy="62" r="12" stroke="#ff8fab" stroke-width="2.5" fill="none"/>
          <circle cx="78" cy="62" r="5" fill="#ff8fab" opacity="0.3"/>
          <rect x="75.5" y="47" width="5" height="7" rx="1.5" fill="#ff8fab"/>
          <rect x="75.5" y="70" width="5" height="7" rx="1.5" fill="#ff8fab"/>
          <rect x="63" y="59.5" width="7" height="5" rx="1.5" fill="#ff8fab"/>
          <rect x="86" y="59.5" width="7" height="5" rx="1.5" fill="#ff8fab"/>
        </g>
        <!-- Exclamation mark -->
        <g class="exclaim">
          <circle cx="90" cy="22" r="10" fill="#ff4e6a" opacity="0.1"/>
          <circle cx="90" cy="22" r="10" stroke="#ff4e6a" stroke-width="2" fill="none"/>
          <text x="90" y="27" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" font-weight="800" fill="#ff4e6a">!</text>
        </g>
      </svg>
    </div>

    <div class="error-code">500</div>

    <div class="status-badge">
      <span class="dot"></span>
      We're aware and working on it
    </div>

    <h1>Our servers need a quick break</h1>
    <p>Something went wrong on our end — it's not you, it's us. Our team has been notified and we're already on it. Please try again in a moment.</p>

    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
      </a>
      <button onclick="location.reload()" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Try Again
      </button>
    </div>

  </div>
</body>
</html>
