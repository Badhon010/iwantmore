{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Your Profile</title>
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
#profile-main h1{
  justify-content: center;
}
.file-input {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid var(--btn-bg);
  cursor: pointer;
  margin: auto;
  margin-bottom: 10px;
}

.file-input input {
  opacity: 0;
  position: absolute;
  width: 100%;
  height: 100%;
  cursor: pointer;
}

.file-input img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  border-radius: 50%;
}

.file-input div {
  font-size: 50px;
  color: var(--btn-bg);
}
.file-input label {
  font-size: 20px;
  color: rgb(112, 112, 112);
  position: absolute;
  bottom: 0px;
  background-color: #c7c7c768;
  width: 100%;
  height: 30%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.file-input:hover{
  border-color: var(--btn-bg-hover);
}

.file-input:hover div {
  color: var(--btn-bg-hover);
}
</style>
</head>

<body>

  <main>
    <div id="profile-main" class="forms">
      <h1>Complete Your Profile</h1>
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="file-input">
          <div id="default-icon">
            <i class="fa-solid fa-user"></i> <!-- Default icon -->
          </div>
          <label  for="profile_picture"><i class="fa-solid fa-camera"></i></label>
          <input type="file" name="profile_picture" id="profile_picture" accept="image/*">
        </div>
        
        <!-- Full Name -->
        <div class="inputs">
          <div class="full-input">
            <label for="full_name"><i class="fa-solid fa-user"></i></label>
            <div class="ph">Full Name</div>
            <input type="text" name="full_name" id="full_name" required>
            <div id="full-name-error" class="error"></div>
          </div>
          <!-- Phone Number -->
          <div class="full-input">
            <label for="phone_number"><i class="fa-solid fa-phone"></i></label>
            <div class="ph">Phone Number</div>
            <input type="number" name="phone_number" id="phone_number" required>
            <div id="full-phon-error" class="error"></div>
          </div>
        </div>
        <button type="submit">Complete Profile</button>
      </form>
    </div>
  </main>
  <script>
document.addEventListener("DOMContentLoaded", function () {
  // Profile Picture Preview
  const fileInput = document.getElementById("profile_picture");
  const imagePreview = document.createElement("img");
  const fileInputContainer = document.querySelector(".file-input");
  const defaultIcon = document.getElementById("default-icon");

  fileInputContainer.appendChild(imagePreview);

  fileInput.addEventListener("change", function (event) {
    const file = event.target.files[0];

    if (file) {
      const reader = new FileReader();

      reader.onload = function (e) {
        imagePreview.src = e.target.result;
        imagePreview.style.display = "block";
        defaultIcon.style.display = "none";
      };
      reader.readAsDataURL(file);
    }
  });

  // Input Floating Label Effect
  document.querySelectorAll(".full-input input").forEach((input) => {
    if (input.value.trim() !== "") {
      input.parentElement.classList.add("filled");
    } else {
      input.parentElement.classList.remove("filled");
    }
    input.addEventListener("input", function () {
      if (this.value.trim() !== "") {
        this.parentElement.classList.add("filled");
      } else {
        this.parentElement.classList.remove("filled");
      }
    });
  });

  function validateFullName(name) {
    return /^[A-Za-z]{2,30}\s[A-Za-z]{2,30}$/.test(name.trim());
  }

  function validateBangladeshPhone(phone) {
    return /^(?:\+8801[3-9]\d{8}|01[3-9]\d{8})$/.test(phone.trim());
  }

  // Form Validation Setup
  function setupValidation(input, errorElement, validateFn, errorMsg) {
    input.addEventListener("input", function () {
      if (!validateFn(input.value)) {
        errorElement.textContent = errorMsg;
      } else {
        errorElement.textContent = "";
      }
    });

    return function forceValidate() {
      if (!validateFn(input.value)) {
        errorElement.textContent = errorMsg;
        return false;
      } else {
        errorElement.textContent = "";
        return true;
      }
    };
  }
  const fullNameInput = document.getElementById("full_name");
  const phoneNumberInput = document.getElementById("phone_number");
  const fullNameError = document.getElementById("full-name-error");
  const phoneNumberError = document.getElementById("full-phon-error");

  const forceValidateFullName = setupValidation(
    fullNameInput,
    fullNameError,
    validateFullName,
    "Full Name must contain First Name and Last Name with one space."
  );

  const forceValidatePhoneNumber = setupValidation(
    phoneNumberInput,
    phoneNumberError,
    validateBangladeshPhone,
    "Invalid Bangladesh phone number. Use 01XXXXXXXXX or +8801XXXXXXXXX."
  );

  // Form Submission Handling
  const profileForm = document.querySelector("form");
  profileForm.addEventListener("submit", function (e) {
    const validFullName = forceValidateFullName();
    const validPhoneNumber = forceValidatePhoneNumber();

    if (!validFullName || !validPhoneNumber) {
      e.preventDefault();
      alert("Please correct the errors before submitting.");
    } else {
      alert("Profile completed successfully!");
    }
  });
});
  </script>
  
  
</body>

</html>
