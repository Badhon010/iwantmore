{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Password reset complete - I Want More" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Password Reset Complete | I Want More</title>
  <link rel="stylesheet" href="{% static 'css/auth.css' %}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="icon" href="{% static 'imgs/logo.jpg' %}" type="image/x-icon">
</head>
<body>
  <main>
    <div class="forms">
        <h1><img src="{% static 'imgs/iwm.png' %}" alt="logo"> I Want More <a href="{% url 'home' %}" class="closel">&times;</a></h1>
        
        <h2 style="font-size: 20px; margin-bottom: 15px;">Password Reset Complete</h2>
        
        <div style="background-color: #e8f5e9; padding: 20px; border-radius: 5px; margin-bottom: 20px; text-align: center;">
            <i class="fas fa-check-circle" style="font-size: 2.5rem; color: #2e7d32; margin-bottom: 15px; display: block;"></i>
            <p style="font-size: 14px; color: #2e7d32;">Your password has been set. You may now log in with your new password.</p>
        </div>
        
        <a href="{% url 'login' %}" style="display: block; background-color: var(--btn-bg); color: white; padding: 10px; border-radius: 5px; text-decoration: none; text-align: center;">Log In Now</a>
    </div>
  </main>
</body>
</html>
