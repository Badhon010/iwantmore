{% extends "base.html" %}
{% load static %}

{% block title %}Your Wishlist - I Want More{% endblock %}
{% block styles %}
<link rel="stylesheet" href="{% static 'css/wishlist.css' %}">
{% endblock %}

{% block content %}
<div class="wishlist-container">
  <h1 class="wishlist-title">Your Wishlist</h1>

  <div class="wishlist-content">
    <div class="wishlist-items">
      <div class="empty-wishlist-message" id="emptyWishlistMessage">
        <div class="empty-state-icon-wrap">
          <i class="fas fa-heart"></i>
        </div>
        <h2 class="empty-state-heading">Your wishlist is empty</h2>
        <p class="empty-state-text">Save the items you love and come back to them anytime.</p>
        <a href="{% url 'shop' %}" class="btn wishlist-shop-btn">
          <i class="fas fa-store"></i>&nbsp; Browse Products
        </a>
      </div>

      <div class="wishlist-grid" id="wishlistGrid"></div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  displayWishlist();

  function displayWishlist() {
    const wishlistItems = JSON.parse(localStorage.getItem('wishlistItems')) || [];
    const wishlistGrid = document.getElementById('wishlistGrid');
    const emptyMsg     = document.getElementById('emptyWishlistMessage');

    wishlistGrid.innerHTML = '';

    if (wishlistItems.length === 0) {
      wishlistGrid.style.display = 'none';
      emptyMsg.style.display = 'flex';
      return;
    }

    wishlistGrid.style.display = 'grid';
    emptyMsg.style.display = 'none';

    wishlistItems.forEach(function (item, index) {
      const el = document.createElement('div');
      el.className = 'wishlist-item';
      el.innerHTML =
        '<div class="item-image"><img src="' + item.image + '" alt="' + item.name + '"></div>' +
        '<div class="item-details">' +
          '<h3 class="item-name">' + item.name + '</h3>' +
          '<p class="item-price">৳' + item.price + '</p>' +
          '<div class="item-actions">' +
            '<button class="add-to-cart-btn" data-index="' + index + '">Add to Cart</button>' +
            '<button class="remove-btn" data-index="' + index + '"><i class="fas fa-trash"></i></button>' +
          '</div>' +
        '</div>';
      wishlistGrid.appendChild(el);
    });

    wishlistGrid.querySelectorAll('.add-to-cart-btn').forEach(function (btn) {
      btn.addEventListener('click', function () { moveToCart(parseInt(this.dataset.index)); });
    });
    wishlistGrid.querySelectorAll('.remove-btn').forEach(function (btn) {
      btn.addEventListener('click', function () { removeItem(parseInt(this.dataset.index)); });
    });
  }

  function moveToCart(index) {
    const wishlistItems = JSON.parse(localStorage.getItem('wishlistItems')) || [];
    const item = wishlistItems[index];
    if (!item) return;

    const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
    const existing  = cartItems.findIndex(function (c) { return c.id == item.id; });
    if (existing !== -1) {
      cartItems[existing].quantity += 1;
    } else {
      cartItems.push({ id: item.id, name: item.name, price: item.price, image: item.image, quantity: 1 });
    }
    localStorage.setItem('cartItems', JSON.stringify(cartItems));

    if (typeof updateCartCount === 'function') updateCartCount();
    showNotification('Added to cart');
  }

  function removeItem(index) {
    const wishlistItems = JSON.parse(localStorage.getItem('wishlistItems')) || [];
    if (!confirm('Remove this item from your wishlist?')) return;
    wishlistItems.splice(index, 1);
    localStorage.setItem('wishlistItems', JSON.stringify(wishlistItems));
    if (typeof updateWishlistCount === 'function') updateWishlistCount();
    displayWishlist();
  }

  function showNotification(message) {
    var container = document.querySelector('.notification-container');
    if (!container) {
      container = document.createElement('div');
      container.className = 'notification-container';
      document.body.appendChild(container);
    }
    var n = document.createElement('div');
    n.className = 'notification';
    n.innerHTML = '<i class="notification-icon fas fa-check-circle"></i><span class="notification-message">' + message + '</span>';
    container.appendChild(n);
    setTimeout(function () { n.classList.add('show'); }, 10);
    setTimeout(function () {
      n.classList.remove('show');
      setTimeout(function () { n.remove(); }, 300);
    }, 3000);
  }
});
</script>
{% endblock %}
